<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spike B — Geresim-style hex mesh volume rendering</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #06080c; color: #cde; font-family: 'JetBrains Mono', monospace; }
    canvas { display: block; }
    #hud { position: fixed; top: 12px; left: 12px; z-index: 9; font-size: 11px; line-height: 1.5;
           background: rgba(20,28,40,0.7); padding: 8px 12px; border-radius: 6px;
           border: 1px solid rgba(160,210,255,0.18); max-width: 360px; }
    #hud b { color: #7cefff; font-weight: 400; }
    #hud .row { display: flex; justify-content: space-between; gap: 12px; }
    #hud button { background: rgba(255,255,255,0.04); border: 1px solid rgba(160,210,255,0.3);
                 color: #cde; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;
                 font-family: inherit; }
    #hud button:hover { background: rgba(111,227,255,0.1); border-color: #7cefff; color: #7cefff; }
    #hud button.on { background: rgba(111,227,255,0.18); border-color: #7cefff; color: #7cefff; }
    #err { position: fixed; top: 12px; right: 12px; max-width: 50%; z-index: 99; color: #ff8a8a;
           font-size: 11px; background: rgba(60,20,20,0.85); padding: 8px 12px; border-radius: 6px;
           white-space: pre-wrap; display: none; }
  </style>
</head>
<body>
  <div id="hud">
    <div><b>Spike B</b> — Geresim-style hex mesh</div>
    <div class="row"><span>cells</span><span id="s-cells">—</span></div>
    <div class="row"><span>points</span><span id="s-points">—</span></div>
    <div class="row"><span>grid</span><span id="s-grid">—</span></div>
    <div class="row"><span>build</span><span id="s-build">—</span></div>
    <div class="row"><span>scalar</span><span id="s-range">—</span></div>
    <div class="row"><span>fps</span><span id="s-fps">—</span></div>
    <div class="row"><span>mode</span><span>
      <button data-m="0" id="m0">wire</button>
      <button data-m="1" id="m1">solid</button>
      <button data-m="2" class="on" id="m2">geresim</button>
    </span></div>
  </div>
  <div id="err"></div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ---------- error display ----------
  const errEl = document.getElementById('err');
  function showErr(e) { errEl.textContent = String(e?.stack || e); errEl.style.display = 'block'; }
  window.addEventListener('error', e => showErr(e.error || e.message));

  // ---------- VTK parser (legacy ASCII unstructured_grid, hex only) ----------
  function parseVTK(text) {
    const lines = text.split('\n');
    let i = 0;
    const next = () => lines[i++];
    // Skip blank lines — VTK files often have blanks between sections
    const nextNonBlank = () => { let l; do { l = next(); } while (l !== undefined && l.trim() === ''); return l; };
    if (!next().startsWith('# vtk DataFile')) throw new Error('not a VTK file');
    nextNonBlank(); // title
    if (nextNonBlank().trim() !== 'ASCII') throw new Error('only ASCII VTK supported');
    if (!nextNonBlank().includes('UNSTRUCTURED_GRID')) throw new Error('expected UNSTRUCTURED_GRID');
    const ptsLine = nextNonBlank().split(/\s+/);
    const nPoints = parseInt(ptsLine[1]);
    const positions = new Float32Array(nPoints * 3);
    for (let p = 0; p < nPoints; p++) {
      const parts = next().trim().split(/\s+/).map(Number);
      positions[p*3] = parts[0]; positions[p*3+1] = parts[1]; positions[p*3+2] = parts[2];
    }

    const cellsLine = nextNonBlank().split(/\s+/); // CELLS N SIZETOTAL
    const nCells = parseInt(cellsLine[1]);
    const cellConn = new Uint32Array(nCells * 8);
    for (let c = 0; c < nCells; c++) {
      const parts = next().trim().split(/\s+/).map(Number);
      if (parts[0] !== 8) throw new Error(`cell ${c} is not hex (nverts=${parts[0]})`);
      for (let k = 0; k < 8; k++) cellConn[c*8 + k] = parts[k+1];
    }

    const ctLine = nextNonBlank().split(/\s+/); // CELL_TYPES N
    const nCT = parseInt(ctLine[1]);
    for (let c = 0; c < nCT; c++) {
      const t = parseInt(next().trim());
      if (t !== 12) throw new Error(`cell ${c} is not VTK_HEXAHEDRON (type=${t})`);
    }

    // POINT_DATA + SCALARS + LOOKUP_TABLE + nPoints floats
    if (!nextNonBlank().startsWith('POINT_DATA')) throw new Error('expected POINT_DATA');
    if (nextNonBlank().trim() !== 'SCALARS scalars float') throw new Error('expected SCALARS line');
    if (nextNonBlank().trim() !== 'LOOKUP_TABLE default') throw new Error('expected LOOKUP_TABLE');
    const scalars = new Float32Array(nPoints);
    for (let p = 0; p < nPoints; p++) scalars[p] = parseFloat(next().trim());

    return { positions, cellConn, scalars, nPoints, nCells };
  }
  function expect(actual, want) { if (actual !== want) throw new Error(`expected "${want}", got "${actual}"`); }

  // ---------- point-in-hex (linear approximation at cell center) ----------
  // Returns (u,v,w) in [0,1] or null if outside.
  // Closed-form linearization: exact for axis-aligned cells, small error
  // for highly twisted cells. Newton-Raphson is too slow/oscillates for
  // a precompute loop; the linear result is good enough for the spike.
  function inverseTrilinear(corners, p) {
    const C = corners;
    const c = (i, j, k) => [C[(i + 2*j + 4*k)*3], C[(i + 2*j + 4*k)*3 + 1], C[(i + 2*j + 4*k)*3 + 2]];
    const c000p = c(0,0,0), c100p = c(1,0,0), c010p = c(0,1,0), c110p = c(1,1,0);
    const c001p = c(0,0,1), c101p = c(1,0,1), c011p = c(0,1,1), c111p = c(1,1,1);
    const cen = [
      0.125 * (c000p[0] + c100p[0] + c010p[0] + c110p[0] + c001p[0] + c101p[0] + c011p[0] + c111p[0]),
      0.125 * (c000p[1] + c100p[1] + c010p[1] + c110p[1] + c001p[1] + c101p[1] + c011p[1] + c111p[1]),
      0.125 * (c000p[2] + c100p[2] + c010p[2] + c110p[2] + c001p[2] + c101p[2] + c011p[2] + c111p[2]),
    ];
    const aU = [0.25 * (c100p[0] + c110p[0] + c101p[0] + c111p[0]),
               0.25 * (c100p[1] + c110p[1] + c101p[1] + c111p[1]),
               0.25 * (c100p[2] + c110p[2] + c101p[2] + c111p[2])];
    const aV = [0.25 * (c010p[0] + c110p[0] + c011p[0] + c111p[0]),
               0.25 * (c010p[1] + c110p[1] + c011p[1] + c111p[1]),
               0.25 * (c010p[2] + c110p[2] + c011p[2] + c111p[2])];
    const aW = [0.25 * (c001p[0] + c101p[0] + c011p[0] + c111p[0]),
               0.25 * (c001p[1] + c101p[1] + c011p[1] + c111p[1]),
               0.25 * (c001p[2] + c101p[2] + c011p[2] + c111p[2])];
    const b0 = p[0] - cen[0], b1 = p[1] - cen[1], b2 = p[2] - cen[2];
    const det = aU[0]*(aV[1]*aW[2] - aV[2]*aW[1])
              - aU[1]*(aV[0]*aW[2] - aV[2]*aW[0])
              + aU[2]*(aV[0]*aW[1] - aV[1]*aW[0]);
    if (Math.abs(det) < 1e-12) return null;
    const invDet = 1 / det;
    const du =  invDet * (b0*(aV[1]*aW[2] - aV[2]*aW[1]) - b1*(aV[0]*aW[2] - aV[2]*aW[0]) + b2*(aV[0]*aW[1] - aV[1]*aW[0]));
    const dv = -invDet * (b0*(aU[1]*aW[2] - aU[2]*aW[1]) - b1*(aU[0]*aW[2] - aU[2]*aW[0]) + b2*(aU[0]*aW[1] - aU[1]*aW[0]));
    const dw =  invDet * (b0*(aU[1]*aV[2] - aU[2]*aV[1]) - b1*(aU[0]*aV[2] - aU[2]*aV[0]) + b2*(aU[0]*aV[1] - aU[1]*aV[0]));
    const u = 0.5 + du, v = 0.5 + dv, w = 0.5 + dw;
    if (u >= -1e-3 && u <= 1 + 1e-3 && v >= -1e-3 && v <= 1 + 1e-3 && w >= -1e-3 && w <= 1 + 1e-3) {
      return [Math.max(0, Math.min(1, u)), Math.max(0, Math.min(1, v)), Math.max(0, Math.min(1, w))];
    }
    return null;
  }

  // ---------- canvas2D fallback projector ----------
  // Three ortho projections of the mesh, drawn with Canvas2D. Used when
  // WebGL2 isn't available (e.g. ANGLE/swiftshader blacklist, GPU off).
  // Same algorithm as snap2d.mjs, inlined so the spike stays self-contained.
  function renderCanvas2DFallback(mesh, bbox, sMin, sMax) {
    // THREE.Box3.min / .max are Vector3 — .x .y .z properties, NOT array indices.
    // Materialise them as plain [x,y,z] arrays so the views loop can use
    // bbox.min[ax] / bbox.max[ax] without dragging the rest of the spike into
    // Vector3-specific syntax.
    const bMin = [bbox.min.x, bbox.min.y, bbox.min.z];
    const bMax = [bbox.max.x, bbox.max.y, bbox.max.z];
    const CW = 1320, CH = 1380;
    const canvas = document.createElement('canvas');
    canvas.width = CW; canvas.height = CH;
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0a0d11;z-index:1';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0d11'; ctx.fillRect(0, 0, CW, CH);

    // Per-cell corner list + mean scalar
    const cells = new Array(mesh.nCells);
    for (let c = 0; c < mesh.nCells; c++) {
      const corners = new Array(8);
      let s = 0;
      for (let k = 0; k < 8; k++) {
        const pi = mesh.cellConn[c*8+k];
        corners[k] = [mesh.positions[pi*3], mesh.positions[pi*3+1], mesh.positions[pi*3+2]];
        s += mesh.scalars[pi];
      }
      cells[c] = { corners, s: s / 8 };
    }

    // Viridis 5 stops (same as snap2d)
    const stops = [
      [0.267, 0.004, 0.329], [0.231, 0.322, 0.545], [0.129, 0.569, 0.549],
      [0.369, 0.788, 0.384], [0.992, 0.906, 0.145],
    ];
    function col(t) {
      t = Math.max(0, Math.min(1, t));
      if (t >= 1) {
        const L = stops[4];
        return 'rgb(' + Math.round(255*L[0]) + ',' + Math.round(255*L[1]) + ',' + Math.round(255*L[2]) + ')';
      }
      const seg = Math.min(stops.length - 2, Math.floor(t * (stops.length - 1)));
      const l = t * (stops.length - 1) - seg;
      const a = stops[seg], b = stops[seg+1];
      return 'rgb(' + Math.round(255*(a[0]+(b[0]-a[0])*l)) + ',' + Math.round(255*(a[1]+(b[1]-a[1])*l)) + ',' + Math.round(255*(a[2]+(b[2]-a[2])*l)) + ')';
    }

    const VIEWS = [
      { name: 'TOP   (xy  +z axis)', ax: 0, bx: 1, convex: true },
      { name: 'SIDE  (xz  +y axis)', ax: 0, bx: 2, convex: false },
      { name: 'FRONT (yz  +x axis)', ax: 1, bx: 2, convex: false },
    ];
    const PAD = 30, V = 540;
    const layout = [
      { ox: PAD,           oy: 70 },
      { ox: PAD + V + 30,  oy: 70 },
      { ox: PAD,           oy: 70 + V + 60 },
    ];

    let totalDrawn = 0;
    for (let vi = 0; vi < VIEWS.length; vi++) {
      const view = VIEWS[vi];
      const { ox, oy } = layout[vi];
      const ax = view.ax, bx = view.bx;
      const minA = bMin[ax], maxA = bMax[ax];
      const minB = bMin[bx], maxB = bMax[bx];
      const sA = V / Math.max(maxA - minA, 1e-9);
      const sB = V / Math.max(maxB - minB, 1e-9);
      ctx.strokeStyle = '#2a313a'; ctx.lineWidth = 1;
      ctx.strokeRect(ox, oy, V, V);
      ctx.fillStyle = '#6f7a87';
      ctx.fillText(['x','y','z'][ax] + ' ->', ox, oy + V + 14);
      ctx.fillText('^ ' + ['x','y','z'][bx], ox - 28, oy + 12);
      ctx.fillStyle = '#cfd6e0';
      ctx.fillText(view.name, ox, oy - 6);

      let indices = cells.map((_, i) => i);
      if (view.convex) {
        // TOP: painter's algorithm back-to-front so front cells paint on top
        indices.sort((a, b) => {
          const ay = cells[a].corners.reduce((s,p) => s+p[1], 0) / 8;
          const by = cells[b].corners.reduce((s,p) => s+p[1], 0) / 8;
          return by - ay;
        });
      }

      for (const cIdx of indices) {
        const c = cells[cIdx];
        const t = (c.s - sMin) / Math.max(sMax - sMin, 1e-9);
        ctx.fillStyle = col(t);
        ctx.strokeStyle = 'rgba(20,28,38,0.85)';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        if (view.convex) {
          const pts = c.corners.map(p => ({ a: (p[ax] - minA) * sA, b: (p[bx] - minB) * sB }));
          let left = 0;
          for (let i = 1; i < pts.length; i++) if (pts[i].a < pts[left].a) left = i;
          const hull = [];
          let p = left, q;
          do {
            hull.push(p);
            q = (p + 1) % pts.length;
            for (let i = 0; i < pts.length; i++) {
              if (i === p) continue;
              const o = (pts[i].a - pts[p].a) * (pts[q].b - pts[p].b) - (pts[i].b - pts[p].b) * (pts[q].a - pts[p].a);
              if (o > 1e-9) q = i;
            }
            p = q;
          } while (p !== left);
          ctx.moveTo(ox + pts[hull[0]].a, oy + V - pts[hull[0]].b);
          for (let i = 1; i < hull.length; i++) ctx.lineTo(ox + pts[hull[i]].a, oy + V - pts[hull[i]].b);
          ctx.closePath();
        } else {
          let mnA = Infinity, mxA = -Infinity, mnB = Infinity, mxB = -Infinity;
          for (let k = 0; k < 8; k++) {
            const p = c.corners[k];
            if (p[ax] < mnA) mnA = p[ax]; if (p[ax] > mxA) mxA = p[ax];
            if (p[bx] < mnB) mnB = p[bx]; if (p[bx] > mxB) mxB = p[bx];
          }
          ctx.rect(
            ox + (mnA - minA) * sA,
            oy + V - (mxB - minB) * sB,
            (mxA - mnA) * sA,
            (mxB - mnB) * sB
          );
        }
        ctx.fill(); ctx.stroke();
        totalDrawn++;
      }
    }
    ctx.fillStyle = '#7cefff';
    ctx.font = '13px ui-monospace,monospace';
    ctx.fillText('canvas2D fallback — WebGL2 unavailable. ' + totalDrawn.toLocaleString() + ' cells across 3 views.', 30, 70 + (V + 60) * 2 + 30);
  }

  // ---------- main ----------
  (async function main() {
    // File is selected via ?file= query (default: hexa, the AMR test mesh).
    // Other options: ?file=spe9 (real reservoir, porosity ~0.08-0.17).
    const urlParams = new URLSearchParams(location.search);
    const dataFile = urlParams.get('file') === 'spe9' ? 'candidates/spe9.vtk' : 'candidates/hexa.vtk';
    console.info(`[spike-b] loading ${dataFile}`);
    const txt = await fetch(dataFile).then(r => r.text());
    const mesh = parseVTK(txt);
    document.getElementById('s-cells').textContent = mesh.nCells.toLocaleString();
    document.getElementById('s-points').textContent = mesh.nPoints.toLocaleString();

    // Compute scalar min/max for colormap scaling (so different datasets use
    // the full color range instead of getting squashed by a hardcoded /20).
    // (Set into uniforms below, after the uniforms object is created.)
    let sMin = Infinity, sMax = -Infinity;
    for (let i = 0; i < mesh.scalars.length; i++) {
      if (mesh.scalars[i] < sMin) sMin = mesh.scalars[i];
      if (mesh.scalars[i] > sMax) sMax = mesh.scalars[i];
    }

    // Compute bbox
    const bbox = new THREE.Box3();
    const v = new THREE.Vector3();
    for (let p = 0; p < mesh.nPoints; p++) {
      v.set(mesh.positions[p*3], mesh.positions[p*3+1], mesh.positions[p*3+2]);
      bbox.expandByPoint(v);
    }
    console.info('[spike-b] mesh bbox:', bbox);

    // ----- Build cell data 2D texture (8 corners × nCells, RGBA32F) -----
    // Each cell row: 8 vec4 = (x, y, z, scalar) for the 8 corners
    // Texture layout: pack K cells per row to keep both dims under WebGL2's
    // minimum-guaranteed max texture size (2048). Each cell still occupies
    // 8 contiguous texels; the shader converts (cellIdx, cornerIdx) →
    // (col = cornerIdx + 8*(cellIdx % K), row = cellIdx / K) via uniforms.
    const K = 16;
    const W = 8 * K, H = Math.ceil(mesh.nCells / K);
    const cellData = new Float32Array(W * H * 4);
    for (let c = 0; c < mesh.nCells; c++) {
      const row = Math.floor(c / K);
      const colBase = (c % K) * 8;
      for (let k = 0; k < 8; k++) {
        const pi = mesh.cellConn[c*8 + k];
        const idx = (row * W + colBase + k) * 4;
        cellData[idx]   = mesh.positions[pi*3];
        cellData[idx+1] = mesh.positions[pi*3+1];
        cellData[idx+2] = mesh.positions[pi*3+2];
        cellData[idx+3] = mesh.scalars[pi];
      }
    }
    const cellDataTex = new THREE.DataTexture(cellData, W, H, THREE.RGBAFormat, THREE.FloatType);
    cellDataTex.needsUpdate = true;

    // ----- Build cell index 3D texture -----
    // For each voxel in a 3D grid, find which hex cell contains the voxel center.
    // Format: R32UI (0xFFFFFFFF = outside any cell).
    // Acceleration: 8^3 coarse grid maps each tile to a list of cells whose AABB
    // touches the tile. Per-voxel test scans only those candidate cells.
    const GRID = 64;  // finer grid — SPE-9 cells average ~17 ft, voxels ~12 ft at 64³
    const COARSE = 8;
    const data3D = new Uint32Array(GRID * GRID * GRID);
    data3D.fill(0xFFFFFFFF);
    const cellSize = bbox.getSize(new THREE.Vector3()).divideScalar(GRID);
    const coarseSize = bbox.getSize(new THREE.Vector3()).divideScalar(COARSE);

    // 1) Compute AABB per cell
    const cellAABBmin = new Float32Array(mesh.nCells * 3);
    const cellAABBmax = new Float32Array(mesh.nCells * 3);
    for (let c = 0; c < mesh.nCells; c++) {
      let minx=Infinity, miny=Infinity, minz=Infinity, maxx=-Infinity, maxy=-Infinity, maxz=-Infinity;
      for (let k = 0; k < 8; k++) {
        const pi = mesh.cellConn[c*8 + k];
        const x = mesh.positions[pi*3], y = mesh.positions[pi*3+1], z = mesh.positions[pi*3+2];
        if (x < minx) minx = x; if (x > maxx) maxx = x;
        if (y < miny) miny = y; if (y > maxy) maxy = y;
        if (z < minz) minz = z; if (z > maxz) maxz = z;
      }
      cellAABBmin[c*3]   = minx; cellAABBmin[c*3+1] = miny; cellAABBmin[c*3+2] = minz;
      cellAABBmax[c*3]   = maxx; cellAABBmax[c*3+1] = maxy; cellAABBmax[c*3+2] = maxz;
    }

    // 2) Coarse grid: each tile stores list of cell indices whose AABB overlaps
    const coarseCells = new Array(COARSE * COARSE * COARSE);
    for (let i = 0; i < coarseCells.length; i++) coarseCells[i] = [];
    for (let c = 0; c < mesh.nCells; c++) {
      const x0 = Math.max(0, Math.floor((cellAABBmin[c*3]   - bbox.min.x) / coarseSize.x));
      const y0 = Math.max(0, Math.floor((cellAABBmin[c*3+1] - bbox.min.y) / coarseSize.y));
      const z0 = Math.max(0, Math.floor((cellAABBmin[c*3+2] - bbox.min.z) / coarseSize.z));
      const x1 = Math.min(COARSE-1, Math.floor((cellAABBmax[c*3]   - bbox.min.x) / coarseSize.x));
      const y1 = Math.min(COARSE-1, Math.floor((cellAABBmax[c*3+1] - bbox.min.y) / coarseSize.y));
      const z1 = Math.min(COARSE-1, Math.floor((cellAABBmax[c*3+2] - bbox.min.z) / coarseSize.z));
      for (let z = z0; z <= z1; z++) for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
        coarseCells[z * COARSE * COARSE + y * COARSE + x].push(c);
      }
    }
    console.info('[spike-b] coarse grid built');

    // 3) For each fine voxel, find containing cell via coarse-cell list.
    //    The build runs ASYNC (one z-slice per microtask) so the loading
    //    status actually paints in the browser. For SPE-9 (9000 cells,
    //    64^3 voxels) the synchronous version would freeze the tab for
    //    5-10s and look like a black screen.
    const tmpCorners = new Float32Array(24);
    const buildEl = document.getElementById('s-build');
    let totalHits = 0, totalMiss = 0;
    const buildStart = performance.now();

    function yieldToBrowser() {
      return new Promise(r => setTimeout(r, 0));
    }

    async function buildIndex() {
      for (let z = 0; z < GRID; z++) {
        for (let y = 0; y < GRID; y++) {
          for (let x = 0; x < GRID; x++) {
            const wx = bbox.min.x + (x + 0.5) * cellSize.x;
            const wy = bbox.min.y + (y + 0.5) * cellSize.y;
            const wz = bbox.min.z + (z + 0.5) * cellSize.z;
            // Coarse tile
            const cx = Math.min(COARSE-1, Math.floor((wx - bbox.min.x) / coarseSize.x));
            const cy = Math.min(COARSE-1, Math.floor((wy - bbox.min.y) / coarseSize.y));
            const cz = Math.min(COARSE-1, Math.floor((wz - bbox.min.z) / coarseSize.z));
            const cands = coarseCells[cz * COARSE * COARSE + cy * COARSE + cx];
            let best = -1;
            for (let i = 0; i < cands.length; i++) {
              const c = cands[i];
              // AABB prefilter
              if (wx < cellAABBmin[c*3] || wx > cellAABBmax[c*3]) continue;
              if (wy < cellAABBmin[c*3+1] || wy > cellAABBmax[c*3+1]) continue;
              if (wz < cellAABBmin[c*3+2] || wz > cellAABBmax[c*3+2]) continue;
              // inverseTrilinear expects corners in order:
              //   c000, c100, c010, c110, c001, c101, c011, c111
              // VTK hex vertex order is:
              //   c000, c100, c110, c010, c001, c101, c111, c011
              // remap on read so tmpCorners is in the expected order
              const VTK_TO_STD = [0, 1, 3, 2, 4, 5, 7, 6];
              for (let k = 0; k < 8; k++) {
                const pi = mesh.cellConn[c*8 + VTK_TO_STD[k]];
                tmpCorners[k*3]   = mesh.positions[pi*3];
                tmpCorners[k*3+1] = mesh.positions[pi*3+1];
                tmpCorners[k*3+2] = mesh.positions[pi*3+2];
              }
              const uvw = inverseTrilinear(tmpCorners, [wx, wy, wz]);
              if (uvw) { best = c; break; }
            }
            if (best >= 0) { data3D[z * GRID * GRID + y * GRID + x] = best; totalHits++; }
            else totalMiss++;
          }
        }
        // Paint progress every slice so the user sees the build moving
        const pct = Math.round((z + 1) / GRID * 100);
        buildEl.textContent = `${pct}% (${(performance.now() - buildStart) / 1000 | 0}s)`;
        await yieldToBrowser();
      }
    }
    await buildIndex();
    console.info(`[spike-b] cell index: hits=${totalHits} miss=${totalMiss} (${((performance.now() - buildStart) / 1000).toFixed(1)}s)`);
    buildEl.textContent = `done (hits=${totalHits})`;
    console.info(`[spike-b] cell index: hits=${totalHits} miss=${totalMiss}`);
    const cellIndexTex = new THREE.Data3DTexture(data3D, GRID, GRID, GRID);
    cellIndexTex.format = THREE.RedIntegerFormat;
    cellIndexTex.type = THREE.UnsignedIntType;
    cellIndexTex.unpackAlignment = 4;
    cellIndexTex.needsUpdate = true;
    cellIndexTex.minFilter = THREE.NearestFilter;
    cellIndexTex.magFilter = THREE.NearestFilter;
    document.getElementById('s-grid').textContent = `${GRID}³`;

    // ----- WebGL2 availability probe -----
    // The headless swiftshader stack (and some locked-down corporate
    // browsers) can't run our usampler3D-based fragment shader, even
    // though Chrome itself is on the page. Without a fallback the canvas
    // would just go black and we'd have no visual to debug. The fallback
    // is a canvas2D three-view projector — at least the geometry of the
    // data is observable.
    const probeCanvas = document.createElement('canvas');
    let webglAvailable = false;
    try {
      webglAvailable = !!probeCanvas.getContext('webgl2');
    } catch (e) {
      webglAvailable = false;
    }
    if (!webglAvailable) {
      console.warn('[spike-b] WebGL2 unavailable — switching to canvas2D projection fallback');
      document.getElementById('s-build').textContent = 'canvas2D (no WebGL)';
      document.getElementById('s-range').textContent = `${sMin.toFixed(3)} to ${sMax.toFixed(3)}`;
      renderCanvas2DFallback(mesh, bbox, sMin, sMax);
      return;
    }

    // ----- Three.js scene -----
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // Camera near/far must scale with the model — 100 fits hexa.vtk (~0.96)
    // but clips SPE-9 (reservoir in feet, ~7200 wide). Use the bbox diagonal
    // as the unit so any model fits comfortably.
    const bboxDiagForCam = bbox.getSize(new THREE.Vector3()).length();
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, bboxDiagForCam * 0.001, bboxDiagForCam * 5);
    const center = bbox.getCenter(new THREE.Vector3());
    const bboxSize = bbox.getSize(new THREE.Vector3());
    const radius = bboxSize.length() * 0.5;

    // Choose camera offset direction based on the bbox shape. For roughly
    // cubic bboxes (e.g. hexa.vtk), use the standard diagonal offset. For
    // slab-like bboxes (e.g. SPE-9 reservoir: 7200x7500x777), use the SHORTEST
    // axis as the view direction so the camera looks face-on at the slab.
    // A small transverse offset is added to the camera so the ray is never
    // exactly axis-aligned (the slab-method degenerates when ray direction
    // has zero components, giving tNear == tFar and the ray-march loop
    // takes only one step).
    let camOffset;
    if (Math.min(bboxSize.x, bboxSize.y, bboxSize.z) < Math.max(bboxSize.x, bboxSize.y, bboxSize.z) * 0.3) {
      // Slab-like: view along the short axis, with transverse perturbation
      const shortAxis = bboxSize.x < bboxSize.y && bboxSize.x < bboxSize.z ? 'x'
                      : bboxSize.y < bboxSize.z ? 'y' : 'z';
      const along = shortAxis === 'x' ? 'x' : shortAxis === 'y' ? 'y' : 'z';
      const offset = new THREE.Vector3();
      offset[along] = radius * 1.5;
      // Add 7% of the longest axis as a transverse offset
      const perturb = radius * 0.35;
      const otherAxes = ['x', 'y', 'z'].filter(a => a !== along);
      offset[otherAxes[0]] = perturb;
      offset[otherAxes[1]] = perturb * 0.6;
      camOffset = offset;
    } else {
      camOffset = new THREE.Vector3(radius * 1.2, radius * 0.6, radius * 1.2);
    }
    camera.position.set(center.x + camOffset.x, center.y + camOffset.y, center.z + camOffset.z);

    const scene = new THREE.Scene();
    // Simple mouse-orbit (no OrbitControls dep — small inline)
    let isDown = false, lastX = 0, lastY = 0;
    let theta = Math.atan2(camera.position.z - center.z, camera.position.x - center.x);
    let phi   = Math.atan2(Math.hypot(camera.position.x - center.x, camera.position.z - center.z), camera.position.y - center.y);
    let dist  = camera.position.distanceTo(center);
    renderer.domElement.addEventListener('pointerdown', e => { isDown = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('pointerup',   () => isDown = false);
    window.addEventListener('pointermove', e => {
      if (!isDown) return;
      theta -= (e.clientX - lastX) * 0.005;
      phi   -= (e.clientY - lastY) * 0.005;
      phi = Math.max(0.05, Math.min(Math.PI - 0.05, phi));
      lastX = e.clientX; lastY = e.clientY;
      updateCamera();
    });
    renderer.domElement.addEventListener('wheel', e => {
      e.preventDefault();
      dist *= Math.exp(e.deltaY * 0.001);
      dist = Math.max(radius * 0.3, Math.min(radius * 5, dist));
      updateCamera();
    }, { passive: false });
    function updateCamera() {
      const sp = Math.sin(phi);
      camera.position.set(
        center.x + dist * sp * Math.cos(theta),
        center.y + dist * Math.cos(phi),
        center.z + dist * sp * Math.sin(theta),
      );
      camera.lookAt(center);
    }

    // Fullscreen quad with custom shader
    const quadGeom = new THREE.PlaneGeometry(2, 2);
    const uniforms = {
      uBboxMin:   { value: bbox.min.clone() },
      uBboxMax:   { value: bbox.max.clone() },
      uCellData:  { value: cellDataTex },
      uCellIndex: { value: cellIndexTex },
      uGridSize:  { value: GRID },
      uCamPos:    { value: camera.position.clone() },
      uCamFwd:    { value: new THREE.Vector3() },
      uCamRight:  { value: new THREE.Vector3() },
      uCamUp:     { value: new THREE.Vector3() },
      uMode:      { value: 2 },
      uFovY:      { value: camera.fov * Math.PI / 180 },
      uScalarMin: { value: 0.0 },
      uScalarMax: { value: 20.0 },
      uTexK:      { value: 16 },  // cells per row in the cellData texture
    };
    // Wire the dynamic scalar range (computed above) into the shader so
    // every dataset gets the full rainbow regardless of value range.
    uniforms.uScalarMin.value = sMin;
    uniforms.uScalarMax.value = sMax;
    console.info(`[spike-b] scalar range: ${sMin.toFixed(3)} to ${sMax.toFixed(3)}`);
    document.getElementById('s-range').textContent = `${sMin.toFixed(2)} to ${sMax.toFixed(2)}`;
    const mat = new THREE.ShaderMaterial({
      uniforms,
      glslVersion: THREE.GLSL3,  // shader uses GLSL 3.0 features (in/out, usampler3D, etc.)
      vertexShader: /* glsl */`
        out vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: /* glsl */`
        precision highp float;
        precision highp int;
        precision highp usampler3D;  // GLSL ES 3.0: integer samplers need explicit precision
        in vec2 vUv;
        // Explicit layout to avoid 'multiple outputs without location' error.
        // In GLSL3 mode, Three.js does NOT declare pc_fragColor or define gl_FragColor,
        // so we own the fragment output entirely.
        layout(location = 0) out vec4 outColor;
        uniform vec3  uBboxMin;
        uniform vec3  uBboxMax;
        uniform sampler2D uCellData;     // 8 × nCells, RGBA32F: (x,y,z,scalar) per corner
        uniform usampler3D uCellIndex;   // 64^3, R32UI: cell index, 0xFFFFFFFF = outside
        uniform int  uGridSize;
        uniform vec3  uCamPos;
        uniform vec3  uCamFwd;
        uniform vec3  uCamRight;
        uniform vec3  uCamUp;
        uniform float uFovY;
        uniform int   uMode;
        uniform float uScalarMin;
        uniform float uScalarMax;
        uniform int   uTexK;  // cells per row in cellData texture

        // Step size adapts to the mesh's bbox so we always cover the full
        // volume regardless of model units. Without this, meshes that
        // are not unit-cube scaled (e.g. SPE-9 in feet) would have STEP_SIZE
        // that's 1000x too small and the ray wouldn't actually traverse
        // any cells.
        float bboxDiag = length(uBboxMax - uBboxMin);
        float stepSize = max(bboxDiag / 200.0, 1e-5);
        const float EPS = bboxDiag * 1e-5;
        const uint OUTSIDE = 0xFFFFFFFFu;

        // 1D colormap (rainbow-ish, 6 stops)
        vec3 colormap(float t) {
          t = clamp(t, 0.0, 1.0);
          vec3 c0 = vec3(0.05, 0.05, 0.40);
          vec3 c1 = vec3(0.10, 0.55, 0.95);
          vec3 c2 = vec3(0.20, 0.95, 0.85);
          vec3 c3 = vec3(0.95, 0.95, 0.40);
          vec3 c4 = vec3(0.95, 0.55, 0.15);
          vec3 c5 = vec3(0.55, 0.05, 0.05);
          if (t < 0.20) return mix(c0, c1, t / 0.20);
          if (t < 0.40) return mix(c1, c2, (t - 0.20) / 0.20);
          if (t < 0.60) return mix(c2, c3, (t - 0.40) / 0.20);
          if (t < 0.80) return mix(c3, c4, (t - 0.60) / 0.20);
          return mix(c4, c5, (t - 0.80) / 0.20);
        }

        // Trilinear sample of scalar field at local (u,v,w) within a cell.
        // c000..c111.w = scalar at each corner.
        float sampleScalar(vec4 c000, vec4 c100, vec4 c010, vec4 c110, vec4 c001, vec4 c101, vec4 c011, vec4 c111, vec3 uvw) {
          float u = uvw.x, v = uvw.y, w = uvw.z;
          float u0 = 1.0 - u, v0 = 1.0 - v, w0 = 1.0 - w;
          return u0*v0*w0*c000.w + u*v0*w0*c100.w + u0*v*w0*c010.w + u*v*w0*c110.w
               + u0*v0*w *c001.w + u*v0*w *c101.w + u0*v*w *c011.w + u*v*w *c111.w;
        }
        // Trilinear gradient (3D) — returns ∂f/∂(u,v,w). Used as the "pseudo-normal"
        // (after transforming to world space via the cell's position basis).
        vec3 sampleGradient(vec4 c000, vec4 c100, vec4 c010, vec4 c110, vec4 c001, vec4 c101, vec4 c011, vec4 c111, vec3 uvw) {
          float u = uvw.x, v = uvw.y, w = uvw.z;
          float u0 = 1.0 - u, v0 = 1.0 - v, w0 = 1.0 - w;
          // ∂f/∂u
          float ddu = -v0*w0*c000.w + v0*w0*c100.w - v*w0*c010.w + v*w0*c110.w
                    + -v0*w *c001.w + v0*w *c101.w - v*w *c011.w + v*w *c111.w;
          float ddv = -u0*w0*c000.w - u*w0*c100.w + u0*w0*c010.w + u*w0*c110.w
                    + -u0*w *c001.w - u*w *c101.w + u0*w *c011.w + u*w *c111.w;
          float ddw = -u0*v0*c000.w - u*v0*c100.w - u0*v*c010.w - u*v*c110.w
                    +  u0*v0*c001.w + u*v0*c101.w + u0*v*c011.w + u*v*c111.w;
          return vec3(ddu, ddv, ddw);
        }

        // Slab method: ray-AABB intersection. Returns tNear, tFar. If no hit, tFar < tNear.
        vec2 rayAABB(vec3 ro, vec3 rd, vec3 bmin, vec3 bmax) {
          vec3 invD = 1.0 / rd;
          vec3 t0 = (bmin - ro) * invD;
          vec3 t1 = (bmax - ro) * invD;
          vec3 tmin = min(t0, t1);
          vec3 tmax = max(t0, t1);
          float tN = max(max(tmin.x, tmin.y), tmin.z);
          float tF = min(min(tmax.x, tmax.y), tmax.z);
          return vec2(tN, tF);
        }

        void main() {
          // Build camera ray for this pixel (no aspect correction — we render square-ish)
          float tanHalf = tan(uFovY * 0.5);
          vec2 ndc = vUv * 2.0 - 1.0;
          vec3 rayDir = normalize(uCamFwd + uCamRight * ndc.x * tanHalf + uCamUp * ndc.y * tanHalf);

          vec3 ro = uCamPos;
          vec3 rd = rayDir;

          // Ray-mesh AABB
          vec2 tHit = rayAABB(ro, rd, uBboxMin - vec3(bboxDiag * 1e-4), uBboxMax + vec3(bboxDiag * 1e-4));
          if (tHit.y < max(tHit.x, 0.0)) { outColor = vec4(0.04, 0.06, 0.09, 1.0); return; }
          float t = max(tHit.x, 0.0);
          float tEnd = tHit.y;

          vec3 bboxSize = uBboxMax - uBboxMin;
          vec3 invBbox = 1.0 / bboxSize;

          vec3 accColor = vec3(0.0);
          float accAlpha = 0.0;

          // March
          int STEPS = 600;
          if (uMode == 0) { STEPS = 1; } // wire: just ray-AABB hit, draw edges via a later pass
          if (uMode == 1) { STEPS = 300; } // solid: take 300 samples, no lighting

          for (int s = 0; s < 400; s++) {
            if (s >= STEPS) break;
            if (t > tEnd) break;
            if (accAlpha > 0.99) break;
            vec3 p = ro + rd * t;
            // Map p to 3D grid coords (continuous)
            vec3 g = clamp((p - uBboxMin) * invBbox, 0.0, 1.0);
            ivec3 gi = ivec3(floor(g * float(uGridSize)));
            gi = clamp(gi, ivec3(0), ivec3(uGridSize - 1));
            uint cellIdx = texelFetch(uCellIndex, gi, 0).r;
            if (cellIdx == OUTSIDE) {
              t += stepSize;
              continue;
            }

            // Sample the 8 corner data for this cell. Each cell occupies
            // 8 contiguous texels in row-major order: row = cellIdx / K,
            // col = (cellIdx % K) * 8 + cornerIdx.
            int cRow = int(cellIdx) / uTexK;
            int cCol = (int(cellIdx) % uTexK) * 8;
            vec4 c000 = texelFetch(uCellData, ivec2(cCol + 0, cRow), 0);
            vec4 c100 = texelFetch(uCellData, ivec2(cCol + 1, cRow), 0);
            vec4 c010 = texelFetch(uCellData, ivec2(cCol + 2, cRow), 0);
            vec4 c110 = texelFetch(uCellData, ivec2(cCol + 3, cRow), 0);
            vec4 c001 = texelFetch(uCellData, ivec2(cCol + 4, cRow), 0);
            vec4 c101 = texelFetch(uCellData, ivec2(cCol + 5, cRow), 0);
            vec4 c011 = texelFetch(uCellData, ivec2(cCol + 6, cRow), 0);
            vec4 c111 = texelFetch(uCellData, ivec2(cCol + 7, cRow), 0);

            if (uMode == 0) {
              // Wire: just darken the cell center a bit so the wireframe shows
              outColor = vec4(0.10, 0.16, 0.22, 1.0);
              return;
            } else if (uMode == 1) {
              // Solid: per-cell constant color from average of 8 corner scalars
              float s = (c000.w + c100.w + c010.w + c110.w + c001.w + c101.w + c011.w + c111.w) / 8.0;
              vec3 c = colormap((s - uScalarMin) / max(uScalarMax - uScalarMin, 1e-6));
              float a = 0.18;
              accColor += (1.0 - accAlpha) * c * a;
              accAlpha += (1.0 - accAlpha) * a;
            } else {
              // Geresim — Miranda-Celes cell-by-cell shading.
              // Each cell computes its own gradient (constant within the
              // cell) from its 8 corner scalars + 8 corner positions, then
              // transforms it to world space via J^{-T} of its cell-centre
              // Jacobian. Adjacent cells can carry very different
              // gradients because their corner scalars differ, so the
              // shading jumps at every cell face — that's the cell-by-cell
              // look Miranda-Celes sell for unstructured hex meshes.
              float scalar = 0.125 * (c000.w + c100.w + c010.w + c110.w
                                    + c001.w + c101.w + c011.w + c111.w);
              // Cell basis vectors at cell centre (matches the JS
              // inverseTrilinear definition so we have a consistent
              // parametric -> world mapping on both sides).
              vec3 aU = 0.25 * ((c100.xyz + c110.xyz + c101.xyz + c111.xyz)
                              - (c000.xyz + c010.xyz + c001.xyz + c011.xyz));
              vec3 aV = 0.25 * ((c010.xyz + c110.xyz + c011.xyz + c111.xyz)
                              - (c000.xyz + c100.xyz + c001.xyz + c101.xyz));
              vec3 aW = 0.25 * ((c001.xyz + c101.xyz + c011.xyz + c111.xyz)
                              - (c000.xyz + c100.xyz + c010.xyz + c110.xyz));
              // Cell-centre trilinear gradient in uvw space (per-uvw-axis
              // = mean of 4 corners on +axis face minus 4 on -axis face).
              vec3 gradUvw = vec3(
                0.25 * ((c100.w + c110.w + c101.w + c111.w) - (c000.w + c010.w + c001.w + c011.w)),
                0.25 * ((c010.w + c110.w + c011.w + c111.w) - (c000.w + c100.w + c001.w + c101.w)),
                0.25 * ((c001.w + c101.w + c011.w + c111.w) - (c000.w + c100.w + c010.w + c110.w))
              );
              // World-space gradient via J^{-T}. Inverse is safe to compute
              // here; the preceding bbox + coarse-grid build guarantees
              // we never sample a degenerate cell (cellAABB degenerates
              // would have det = 0 and shown up as miss in the build log).
              mat3 Jit = transpose(inverse(mat3(aU, aV, aW)));
              vec3 gradXyz = Jit * gradUvw;
              // Degenerate cells get a safe fallback normal so the shader
              // doesn't NaN out and turn the whole pixel black.
              float nLen = length(gradXyz);
              vec3 N = nLen > 1e-9 ? gradXyz / nLen : vec3(0.0, 0.0, 1.0);
              if (any(isnan(N)) || any(isinf(N))) N = vec3(0.0, 0.0, 1.0);
              vec3 L = normalize(uCamPos - p);
              float diff = max(dot(N, L), 0.0);
              float rim = pow(1.0 - max(dot(N, -rd), 0.0), 2.0);
              vec3 base = colormap((scalar - uScalarMin) / max(uScalarMax - uScalarMin, 1e-6));
              vec3 lit = base * (0.4 + 0.5 * diff) + vec3(0.4, 0.6, 0.8) * rim * 0.25;
              if (any(isnan(lit)) || any(isinf(lit))) lit = base;
              // Higher per-step alpha (0.18) so a small number of cells in
              // thin layers still produce visible color. With 600 STEPS the
              // ray covers the bbox at stepSize = diag/200 and gets ~10
              // samples per typical SPE-9 cell.
              float a = 0.18;
              accColor += (1.0 - accAlpha) * lit * a;
              accAlpha += (1.0 - accAlpha) * a;
            }

            t += stepSize;
          }
          outColor = vec4(accColor + (1.0 - accAlpha) * vec3(0.04, 0.06, 0.09), 1.0);
        }
      `,
    });
    const quad = new THREE.Mesh(quadGeom, mat);
    scene.add(quad);

    // Mode buttons
    document.querySelectorAll('#hud button[data-m]').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#hud button[data-m]').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        uniforms.uMode.value = parseInt(b.dataset.m);
      });
    });

    // Render loop + camera basis
    let frame = 0, lastFps = performance.now();
    function animate() {
      updateCamera();
      // Update camera basis uniforms
      uniforms.uCamPos.value.copy(camera.position);
      uniforms.uCamFwd.value.copy(new THREE.Vector3().subVectors(center, camera.position).normalize());
      uniforms.uCamRight.value.copy(new THREE.Vector3().crossVectors(uniforms.uCamFwd.value, camera.up).normalize());
      uniforms.uCamUp.value.copy(new THREE.Vector3().crossVectors(uniforms.uCamRight.value, uniforms.uCamFwd.value).normalize());
      renderer.render(scene, camera);

      frame++;
      const now = performance.now();
      if (now - lastFps > 500) {
        const fps = (frame * 1000) / (now - lastFps);
        document.getElementById('s-fps').textContent = fps.toFixed(0);
        frame = 0;
        lastFps = now;
      }
      requestAnimationFrame(animate);
    }
    animate();
  })().catch(e => showErr(e));
  </script>
</body>
</html>
